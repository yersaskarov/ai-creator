services:
  ai-creator-bot:
    build: .
    container_name: ai-creator-bot
    env_file: .env
    restart: unless-stopped
    volumes:
      - generated_projects:/app/generated_projects
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  generated_projects:
